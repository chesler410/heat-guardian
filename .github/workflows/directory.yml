name: Update meet directory

# Rebuilds src/meets.json from curated sources (scripts/sources/meet_sources.json — fed by
# PRs and the in-app Suggest-a-meet form). It classifies each meet's public PDF links (heat
# sheet / results / info packet), scrapes meet metadata from the info packet, and geocodes
# the location — no backend, no swimmer data. See scripts/build_directory.py.

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pymupdf
      - run: python scripts/build_directory.py
      - name: Commit directory changes (if any)
        run: |
          if [ -n "$(git status --porcelain src/meets.json scripts/sources/_geocache.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/meets.json scripts/sources/_geocache.json
            git commit -m "Update meet directory (automated)"
            git push
          else
            echo "No directory changes."
          fi
