name: iOS TestFlight

# Builds the Capacitor iOS app on a macOS runner and uploads to TestFlight. No Mac needed locally.
#
# Signing: MANUAL (the durable fix health-rpg adopted after automatic signing churned through
# Apple's certificate cap). We import ONE distribution cert + the app's provisioning profile into
# a throwaway keychain and sign with exactly those — NO -allowProvisioningUpdates, so Apple is
# never asked to mint a Development cert. No more revoking certs.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   APPSTORE_CONNECT_KEY_ID       App Store Connect API key ID        (upload — reuse health-rpg's)
#   APPSTORE_CONNECT_ISSUER_ID    Issuer UUID                          (upload — reuse health-rpg's)
#   APPSTORE_CONNECT_KEY_BASE64   base64 of the .p8 key file           (upload — reuse health-rpg's)
#   APPLE_TEAM_ID                 Apple Developer team ID (10 chars)   (reuse health-rpg's)
#   DIST_CERT_P12_BASE64          base64 of the "Apple Distribution" .p12  (REUSE health-rpg's —
#   DIST_CERT_PASSWORD            its export password                        a dist cert is
#                                                                            account-wide)
#   PROVISIONING_PROFILE_BASE64   base64 of an App Store profile for com.chesler410.nextheat (NEW —
#   PROVISIONING_PROFILE_NAME     that profile's name                       make one in the portal
#                                                                           with the same dist cert)
# One-time per app: create the app record in App Store Connect with bundle id com.chesler410.nextheat.

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "TestFlight 'What to Test' notes (testers see this)"
        required: false
        default: |
          What to test in this build:
          • Home — your swimmers' events by day; today's day auto-expands, others collapse (tap a day to toggle).
          • Settings (⚙) — Add a meet, switch theme/language, set taunt edge.
          • Import — paste a results/heat-sheet link OR upload a PDF; try a real meet.
          • Team logo (About) — re-import to recolor the header.
          Please flag anything confusing or broken via the in-app Feedback link.
  push:
    tags: ["ios-v*"]

jobs:
  build-and-upload:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }

      - name: Select latest Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode_*.app 2>/dev/null | grep -v Beta | sort -V | tail -1)
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Install deps + build web
        run: |
          npm ci
          npm run build   # base "/" (no APP_BASE) — correct for Capacitor

      - name: Add iOS platform + sync
        run: |
          npx cap add ios
          npx cap sync ios
          npx cap-assets generate --assetPath assets --ios || npx capacitor-assets generate --assetPath assets || true

      - name: Declare no non-exempt encryption
        # Heat Guardian uses only standard HTTPS, which is export-exempt. Setting this in
        # Info.plist makes every build skip the App Store Connect "Export Compliance" prompt
        # (no more manual toggling each build). ios/ is generated above, so we patch it here.
        run: |
          PLIST=ios/App/App/Info.plist
          plutil -replace ITSAppUsesNonExemptEncryption -bool NO "$PLIST" 2>/dev/null \
            || plutil -insert ITSAppUsesNonExemptEncryption -bool NO "$PLIST"
          plutil -p "$PLIST" | grep ITSAppUsesNonExemptEncryption
          # Location purpose strings. We only ever request when-in-use, but the geolocation
          # library references the "always" API, so Apple (warning 90683) requires BOTH keys —
          # otherwise the build is flagged. Same honest string for each.
          MSG="Heat Guardian uses your location only to show swim meets near you. It never tracks you in the background and never leaves your device."
          for KEY in NSLocationWhenInUseUsageDescription NSLocationAlwaysAndWhenInUseUsageDescription NSLocationAlwaysUsageDescription; do
            plutil -replace "$KEY" -string "$MSG" "$PLIST" 2>/dev/null || plutil -insert "$KEY" -string "$MSG" "$PLIST"
          done
          plutil -p "$PLIST" | grep NSLocation

      - name: Write App Store Connect API key
        env:
          API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          API_KEY_B64: ${{ secrets.APPSTORE_CONNECT_KEY_BASE64 }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$API_KEY_B64" | base64 -d > "$HOME/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8"

      # Manual signing (durable fix): import the distribution cert + App Store profile into a
      # throwaway keychain. xcodebuild signs with exactly these — Apple never mints a new cert.
      - name: Import signing cert + profile
        env:
          P12_B64: ${{ secrets.DIST_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
          PROFILE_B64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PWD=$(openssl rand -base64 24)
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          echo "$P12_B64" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PWD" "$KEYCHAIN"
          # Make our keychain searchable for the build (keep login.keychain too).
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$PROFILE_B64" | base64 -d > \
            "$HOME/Library/MobileDevice/Provisioning Profiles/heatguardian.mobileprovision"

      - name: Set App-target manual signing
        env:
          PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Scope signing to the App target ONLY. Global CLI signing settings also hit the Pods
          # framework targets, which reject an app provisioning profile — the same lesson health-rpg
          # learned with swift-crypto. They used an xcconfig; Capacitor uses CocoaPods, so we patch
          # the App target's build settings directly via the xcodeproj gem.
          gem install xcodeproj --no-document
          ruby -e '
            require "xcodeproj"
            proj = Xcodeproj::Project.open("ios/App/App.xcodeproj")
            target = proj.targets.find { |t| t.name == "App" }
            target.build_configurations.each do |c|
              c.build_settings["CODE_SIGN_STYLE"] = "Manual"
              c.build_settings["CODE_SIGN_IDENTITY"] = "Apple Distribution"
              c.build_settings["PROVISIONING_PROFILE_SPECIFIER"] = ENV["PROFILE_NAME"]
              c.build_settings["DEVELOPMENT_TEAM"] = ENV["TEAM_ID"]
            end
            proj.save
          '

      - name: Build number from commit count
        id: bn
        run: echo "build=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

      - name: Archive
        working-directory: ios/App
        run: |
          # Manual signing comes from the App target's build settings (set above), NOT the CLI —
          # CLI signing args would also force the profile onto the CocoaPods framework targets.
          MARKETING=$(node -p "require('../../package.json').version")
          xcodebuild -workspace App.xcworkspace -scheme App \
            -configuration Release -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            MARKETING_VERSION="$MARKETING" CURRENT_PROJECT_VERSION='${{ steps.bn.outputs.build }}' \
            archive

      - name: Export IPA
        working-directory: ios/App
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.chesler410.nextheat</key><string>${PROFILE_NAME}</string>
            </dict>
            <key>uploadSymbols</key><true/>
          </dict></plist>
          EOF
          # Manual export signs with the imported cert + profile (no API-key/auto provisioning).
          xcodebuild -exportArchive -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/ipa" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
        run: |
          set -o pipefail
          IPA=$(ls "$RUNNER_TEMP"/ipa/*.ipa | head -1)
          xcrun altool --upload-app -f "$IPA" -t ios \
            --apiKey "$API_KEY_ID" --apiIssuer "$API_ISSUER_ID" 2>&1 | tee altool.log
          if grep -q "No errors uploading" altool.log && ! grep -qiE "ERROR:|already been used" altool.log; then
            echo "TestFlight upload accepted."
          else
            echo "::error::TestFlight upload failed — see log above."; exit 1
          fi

      - name: Set TestFlight "What to Test" notes
        if: success()
        continue-on-error: true # the IPA is already uploaded; never fail a release over notes
        env:
          ASC_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
          APP_BUNDLE_ID: com.chesler410.nextheat
          BUILD_NUMBER: ${{ steps.bn.outputs.build }}
          TEST_NOTES: ${{ github.event.inputs.release_notes }}
        run: |
          export ASC_KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          # macOS runner's Python is PEP-668 "externally managed" — install into a venv.
          python3 -m venv "$RUNNER_TEMP/venv"
          "$RUNNER_TEMP/venv/bin/pip" install --quiet "pyjwt[crypto]"
          "$RUNNER_TEMP/venv/bin/python" scripts/set_testflight_notes.py
