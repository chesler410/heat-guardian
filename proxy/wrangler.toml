name = "my-swimmer-fetch"
main = "worker.js"
compatibility_date = "2024-11-01"
# The Anthropic SDK pulls in a few Node built-ins — this flag makes them available on the edge.
compatibility_flags = ["nodejs_compat"]

# Shared meet-pack cache. Create with:  wrangler r2 bucket create heat-guardian-meets
[[r2_buckets]]
binding = "MEETS"
bucket_name = "heat-guardian-meets"

# Rate-limit / spend-protection store. The worker runs fine without it (limits just no-op), but
# binding this KV namespace turns ON three protections at once: per-IP daily cap on /feedback, a
# GLOBAL daily ceiling on AI calls (the spend backstop), and a per-IP cap on share uploads.
# ENABLE IT (recommended before any real/public use):
#   1) cd proxy && wrangler kv namespace create RL
#   2) uncomment the 3 lines below and paste the printed id
#   3) wrangler deploy
# Also set an account-level monthly spend cap in the Anthropic console — belt and suspenders.
[[kv_namespaces]]
binding = "RL"
id = "3e20e61bd3a04f0ca4b112de606d06fe"

# In-app feedback (/report) notifications. Every report is logged to R2 (MEETS) regardless.
# Pick ONE notify channel:
#   • EASIEST (no domain): a Discord/Slack incoming webhook → instant phone push.
#       wrangler secret put REPORT_WEBHOOK   # paste the webhook URL
#   • Email (needs a domain onboarded to Cloudflare Email Sending):
#       wrangler email sending enable <yourdomain.com>
#       then uncomment the send_email binding below and set:
#       wrangler secret put REPORT_TO        # e.g. ches.hughes@gmail.com
#       wrangler secret put REPORT_FROM      # e.g. feedback@yourdomain.com (onboarded domain)
# [[send_email]]
# name = "EMAIL"
